version: '3.8'

networks:
  app_network:
    driver: bridge

services:
  catalog-service:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    environment:
      HOSTNAME: catalog-service
      APP_VERSION: v1.2.0
    ports:
      - "8081:8081"
    networks:
      - app_network

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    environment:
      HOSTNAME: inventory-service
      APP_VERSION: v1.0.5
    ports:
      - "8082:8082"
    networks:
      - app_network

  storefront-bff:
    build:
      context: ./storefront-bff
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      CATALOG_SERVICE_URL: http://catalog-service:8081
      INVENTORY_SERVICE_URL: http://inventory-service:8082
    ports:
      - "8080:8080"
    networks:
      - app_network
    depends_on:
      - catalog-service
      - inventory-service

  storefront-web:
    build:
      context: ./storefront-web
      dockerfile: Dockerfile
    networks:
      - app_network

  api-gateway:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - app_network
    depends_on:
      - storefront-bff
      - storefront-web