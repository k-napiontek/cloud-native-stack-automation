events {
    worker_connections 1024;
}

http {
    upstream storefront_bff {
        server storefront-bff:8080;
    }

    upstream storefront_web {
        server storefront-web:80;
    }

    server {
        listen 80;

        # BFF API 
        location /api/storefront/ {
            proxy_pass http://storefront_bff/api/storefront/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend SPA
        location / {
            proxy_pass http://storefront_web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}