apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-infra-manifests
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: 'https://github.com/k-napiontek/cloud-native-stack-automation.git' # TODO: CHANGE TO YOUR OWN REPO
        revision: HEAD
        directories:
          - path: 03-gitops-infra/manifests/*
  template:
    metadata:
      name: 'dev-manifests-{{path.basename}}'
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: default
      source:
        repoURL: 'https://github.com/k-napiontek/cloud-native-stack-automation.git' # TODO: CHANGE TO YOUR OWN REPO
        targetRevision: HEAD
        path: '{{path}}/dev'
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: '{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true